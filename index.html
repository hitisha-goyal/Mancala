<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mancala Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="setup-screen" class="screen active">
        <div class="wood-panel">
            <h1 class="game-title">Mancala</h1>
            <p class="subtitle">An ancient game of strategy</p>
            
            <div class="input-group">
                <label for="player1">Player 1 (Bottom)</label>
                <input type="text" id="player1" placeholder="Enter Player 1 Name" value="Player 1">
            </div>
            
            <div class="input-group">
                <label for="player2">Player 2 (Top)</label>
                <input type="text" id="player2" placeholder="Enter Player 2 Name" value="Player 2">
            </div>
            
            <div class="input-group" style="display:flex; align-items:center; gap: 10px;">
                <input type="checkbox" id="timer-toggle" style="width: auto; box-shadow: none;">
                <label for="timer-toggle" style="margin: 0; cursor: pointer;">Enable Turn Timer</label>
            </div>
            
            <div class="input-group hidden" id="timer-settings">
                <label for="timer-seconds">Seconds per turn</label>
                <input type="number" id="timer-seconds" value="15" min="5" max="60">
            </div>
            
            <button id="start-btn" class="classic-btn">Commence Game</button>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="game-container">
            <div class="game-header">
                <div class="player-badge p2-badge" id="p2-turn-badge">
                    <span id="p2-name-display">Player 2</span>
                </div>
                
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <h2 id="turn-indicator" class="turn-text">Player 1's Turn</h2>
                    <div id="timer-display" class="hidden" style="font-size: 1.5rem; font-weight: bold; color: #ffeb3b; text-shadow: 0 0 10px #ffeb3b; margin-top: 5px;">
                        <span id="time-left">15</span>s
                    </div>
                </div>
                
                <div class="player-badge p1-badge active-turn" id="p1-turn-badge">
                    <span id="p1-name-display">Player 1</span>
                </div>
            </div>
            
            <div class="mancala-board">
                <!-- P2 Store (Left) -->
                <div class="store p2-store" id="pit-13" data-index="13">
                    <div class="stone-count">0</div>
                    <div class="stone-container"></div>
                    <div class="store-label" id="p2-store-name">Player 2</div>
                </div>
                
                <div class="pits-grid">
                    <!-- Top Row (Player 2: pits 12 to 7) -->
                    <div class="pits-row p2-row">
                        <div class="pit p2-pit" id="pit-12" data-index="12"><div class="stone-count">4</div><div class="stone-container"></div></div>
                        <div class="pit p2-pit" id="pit-11" data-index="11"><div class="stone-count">4</div><div class="stone-container"></div></div>
                        <div class="pit p2-pit" id="pit-10" data-index="10"><div class="stone-count">4</div><div class="stone-container"></div></div>
                        <div class="pit p2-pit" id="pit-9" data-index="9"><div class="stone-count">4</div><div class="stone-container"></div></div>
                        <div class="pit p2-pit" id="pit-8" data-index="8"><div class="stone-count">4</div><div class="stone-container"></div></div>
                        <div class="pit p2-pit" id="pit-7" data-index="7"><div class="stone-count">4</div><div class="stone-container"></div></div>
                    </div>
                    
                    <div class="board-divider"></div>
                    
                    <!-- Bottom Row (Player 1: pits 0 to 5) -->
                    <div class="pits-row p1-row">
                        <div class="pit p1-pit" id="pit-0" data-index="0"><div class="stone-count">4</div><div class="stone-container"></div></div>
                        <div class="pit p1-pit" id="pit-1" data-index="1"><div class="stone-count">4</div><div class="stone-container"></div></div>
                        <div class="pit p1-pit" id="pit-2" data-index="2"><div class="stone-count">4</div><div class="stone-container"></div></div>
                        <div class="pit p1-pit" id="pit-3" data-index="3"><div class="stone-count">4</div><div class="stone-container"></div></div>
                        <div class="pit p1-pit" id="pit-4" data-index="4"><div class="stone-count">4</div><div class="stone-container"></div></div>
                        <div class="pit p1-pit" id="pit-5" data-index="5"><div class="stone-count">4</div><div class="stone-container"></div></div>
                    </div>
                </div>
                
                <!-- P1 Store (Right) -->
                <div class="store p1-store" id="pit-6" data-index="6">
                    <div class="stone-count">0</div>
                    <div class="stone-container"></div>
                    <div class="store-label" id="p1-store-name">Player 1</div>
                </div>
            </div>
            
            <div id="status-msg" class="status-message">Select a pit to start sowing.</div>
            
            <div class="control-panel">
                <button id="in-game-undo-btn" class="alt-btn" disabled>Undo (1 Turn)</button>
                <button id="in-game-restart-btn" class="alt-btn">Restart Game</button>
                <button id="in-game-quit-btn" class="classic-btn secondary-btn">Quit to Menu</button>
            </div>
        </div>
    </div>
    
    <div id="game-over-modal" class="modal hidden">
        <div class="wood-panel text-center result-panel">
            <h2 id="winner-text" class="game-title">Victory!</h2>
            <div class="score-breakdown">
                <p id="p1-final-score">Player 1: 24</p>
                <p id="p2-final-score">Player 2: 24</p>
            </div>
            <div class="btn-group">
                <button id="restart-btn" class="classic-btn">Play Again</button>
                <button id="menu-btn" class="alt-btn">Main Menu</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
